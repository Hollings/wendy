version: '3.8'

# Local development compose. Uses .env from the project root for credentials.
#
#   docker compose -f deploy/docker-compose.dev.yml up --build
#
# Claude sessions persist in a named volume (wendy_claude_dev) so you only
# need to `claude login` once:
#
#   docker compose -f deploy/docker-compose.dev.yml exec wendy claude login
#
# Games use a bind mount instead of a named volume. Create the directory first:
#
#   mkdir -p /tmp/wendy-games-dev

services:
  wendy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: wendy-dev
    init: true
    restart: "no"
    command: ["python", "-m", "wendy"]
    network_mode: host
    volumes:
      - ..:/app                              # live source -- no rebuild needed for code changes
      - ../config:/app/config:ro            # mirror prod: config is read-only
      - wendy_data_dev:/data/wendy
      - wendy_claude_dev:/root/.claude
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ../.env
    environment:
      - WENDY_BASE_DIR=/data/wendy
      - WENDY_DB_PATH=/data/wendy/shared/wendy.db
      - SYSTEM_PROMPT_FILE=/app/config/system_prompt.txt
      - CLAUDE_CLI_IDLE_TIMEOUT=300
      - CLAUDE_CLI_MAX_RUNTIME=1800
      - WENDY_PROXY_PORT=8945
      - ORCHESTRATOR_CONCURRENCY=3
      - WENDY_WEB_URL=http://localhost:8910

  web:
    build:
      context: ..
      dockerfile: services/web/Dockerfile
    container_name: wendy-web-dev
    restart: "no"
    ports:
      - "0.0.0.0:8910:8000"
    networks:
      - web
    volumes:
      - sites_data_dev:/data/sites
      - /tmp/wendy-games-dev:/data/games      # bind mount so game containers can access via host path
      - wendy_data_dev:/data/wendy
      - wendy_claude_dev:/data/claude:ro
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ../.env
    environment:
      - WENDY_DB_PATH=/data/wendy/shared/wendy.db
      - SITES_DIR=/data/sites
      - GAMES_DIR=/data/games
      - HOST_GAMES_DIR=/tmp/wendy-games-dev   # must match the bind mount source above
      - BASE_PORT=8921
      - MAX_GAMES=20
      - BASE_URL=https://wendy.monster
      - DOCKER_NETWORK=deploy_web

  # Build the Deno game runtime image (run once: docker compose --profile build up runtime-builder)
  runtime-builder:
    build:
      context: ..
      dockerfile: services/runtime/Dockerfile
    image: wendy-games-runtime
    command: ["echo", "Runtime image built"]
    profiles:
      - build

volumes:
  wendy_data_dev:
  wendy_claude_dev:
  sites_data_dev:

networks:
  web:
    name: deploy_web
